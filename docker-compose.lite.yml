# OpenDirectory - Small Office Edition (Lite)
# Optimiert für 5-50 Geräte | ~4-6 GB RAM | Single Server
#
# Enthält NUR die essentiellen Services:
#   - PostgreSQL (Identity, Auth, Policy, Network, Printers)
#   - Redis (Caching & Sessions)
#   - MongoDB (Device Data)
#   - LLDAP (User Directory)
#   - Core Services (Identity, Auth, Device, Policy)
#   - Network Infrastructure (DNS/DHCP/SMB/NFS)
#   - API Gateway + Backend
#   - Web Frontend
#
# NICHT enthalten (Enterprise-Features):
#   - RabbitMQ (async messaging - nicht nötig bei <50 Geräten)
#   - Graph Explorer, Policy Simulator, Security Scanner
#   - Auto-Remediation, Antivirus-Protection, Device-Lifecycle
#   - Grafana, Prometheus (optional nachinstallierbar)
#   - Integration Service
#
# Start: docker-compose -f docker-compose.lite.yml up -d
# Stop:  docker-compose -f docker-compose.lite.yml down

version: '3.9'

services:
  # ===================
  # Infrastructure (Minimal)
  # ===================

  postgres:
    image: postgres:15-alpine
    container_name: od-postgres
    environment:
      POSTGRES_USER: opendirectory
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_MULTIPLE_DATABASES: identity,auth,policy,audit,printers,network
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - opendirectory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opendirectory"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: od-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - opendirectory
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 192M

  mongodb:
    image: mongo:6
    container_name: od-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: opendirectory
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD must be set in .env}
      MONGO_INITDB_DATABASE: devices
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - opendirectory
    deploy:
      resources:
        limits:
          memory: 512M

  # ===================
  # LDAP Directory
  # ===================

  lldap:
    image: nitnelave/lldap:stable
    container_name: od-lldap
    environment:
      - LLDAP_JWT_SECRET=${LLDAP_JWT_SECRET:?LLDAP_JWT_SECRET must be set in .env}
      - LLDAP_LDAP_BASE_DN=dc=opendirectory,dc=local
      - LLDAP_LDAP_USER_DN=admin
      - LLDAP_LDAP_USER_PASS=${LLDAP_ADMIN_PASSWORD:?LLDAP_ADMIN_PASSWORD must be set in .env}
    volumes:
      - lldap-data:/data
    ports:
      - "3890:3890"
      - "17170:17170"
    networks:
      - opendirectory
    deploy:
      resources:
        limits:
          memory: 128M

  # ===================
  # Core Services
  # ===================

  identity-service:
    build:
      context: ./services/core/identity-service
      dockerfile: Dockerfile
    container_name: od-identity-service
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD}@postgres/identity
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "3001:3001"
    networks:
      - opendirectory
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  auth-service:
    build:
      context: ./services/core/authentication-service
      dockerfile: Dockerfile
    container_name: od-auth-service
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3002
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD}@postgres/auth
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - LDAP_URL=ldap://lldap:3890
    ports:
      - "3002:3002"
    networks:
      - opendirectory
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  device-service:
    build:
      context: ./services/core/device-service
      dockerfile: Dockerfile
    container_name: od-device-service
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3003
      - MONGODB_URL=mongodb://opendirectory:${MONGO_PASSWORD}@mongodb:27017/devices
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "3003:3003"
    networks:
      - opendirectory
    depends_on:
      - mongodb
      - redis
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  policy-service:
    build:
      context: ./services/core/policy-service
      dockerfile: Dockerfile
    container_name: od-policy-service
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3004
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD}@postgres/policy
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "3004:3004"
    networks:
      - opendirectory
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # ===================
  # Network Infrastructure (DNS/DHCP/SMB/NFS)
  # ===================

  network-infrastructure:
    build:
      context: ./services/core/network-infrastructure
      dockerfile: Dockerfile
    container_name: od-network-infrastructure
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3007
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD}@postgres/network
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - ENABLE_DNS_SERVER=${ENABLE_DNS_SERVER:-true}
      - ENABLE_DHCP_SERVER=${ENABLE_DHCP_SERVER:-true}
      - ENABLE_FILE_SHARES=${ENABLE_FILE_SHARES:-true}
      - ENABLE_NETWORK_DISCOVERY=${ENABLE_NETWORK_DISCOVERY:-true}
      - ENABLE_NETWORK_MONITORING=false
      - BIND_CONFIG_PATH=/etc/bind
      - DHCP_CONFIG_PATH=/etc/dhcp
      - SAMBA_CONFIG_PATH=/etc/samba
    ports:
      - "3007:3007"
      - "53:53/tcp"
      - "53:53/udp"
      - "67:67/udp"
      - "68:68/udp"
      - "139:139"
      - "445:445"
      - "2049:2049"
    networks:
      - opendirectory
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - network-dns-config:/etc/bind
      - network-dhcp-config:/etc/dhcp
      - network-samba-config:/etc/samba
      - network-shares:/srv/shares
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  # ===================
  # Printer Service (optional - auskommentieren wenn keine Drucker)
  # ===================

  printer-service:
    build:
      context: ./services/core/printer-service
      dockerfile: Dockerfile
    container_name: od-printer-service
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3006
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD}@postgres/printers
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CUPS_HOST=localhost
      - CUPS_PORT=631
      - ENABLE_DISCOVERY=true
      - ENABLE_SCANNING=true
    ports:
      - "3006:3006"
      - "631:631"
    networks:
      - opendirectory
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - printer-spool:/var/spool/cups
      - printer-config:/etc/cups
    privileged: true
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    profiles:
      - with-printers

  # ===================
  # Platform (API + Frontend)
  # ===================

  api-gateway:
    build:
      context: ./services/platform/api-gateway
      dockerfile: Dockerfile
    container_name: od-api-gateway
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - API_GATEWAY_PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=info
    ports:
      - "3010:3000"
      - "3011:3001"
    networks:
      - opendirectory
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  api-backend:
    build:
      context: ./services/platform/api-backend
      dockerfile: Dockerfile
    container_name: od-api-backend
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8080
      - CORS_ORIGIN=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET}
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD}@postgres/identity
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "8080:8080"
    networks:
      - opendirectory
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      identity-service:
        condition: service_started
      auth-service:
        condition: service_started
      device-service:
        condition: service_started
      policy-service:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  web-app:
    build:
      context: ./frontend/web-app
      dockerfile: Dockerfile
    container_name: od-web-app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    ports:
      - "3000:3000"
    networks:
      - opendirectory
    depends_on:
      - api-backend
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

# ===================
# Networks
# ===================

networks:
  opendirectory:
    driver: bridge

# ===================
# Volumes
# ===================

volumes:
  postgres-data:
  redis-data:
  mongo-data:
  lldap-data:
  printer-spool:
  printer-config:
  network-dns-config:
  network-dhcp-config:
  network-samba-config:
  network-shares:
