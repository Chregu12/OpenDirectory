version: '3.9'

services:
  # ===================
  # Infrastructure
  # ===================
  
  postgres:
    image: postgres:15-alpine
    container_name: od-postgres
    environment:
      POSTGRES_USER: opendirectory
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      POSTGRES_MULTIPLE_DATABASES: identity,auth,policy,audit,integration,printers,network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    ports:
      - "5432:5432"
    networks:
      - opendirectory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opendirectory"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: od-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - opendirectory
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: od-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: opendirectory
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD must be set in .env}
      MONGO_INITDB_DATABASE: devices
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - opendirectory

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: od-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: opendirectory
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set in .env}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - opendirectory

  # ===================
  # LDAP Service
  # ===================
  
  lldap:
    image: nitnelave/lldap:stable
    container_name: od-lldap
    environment:
      - LLDAP_JWT_SECRET=${LLDAP_JWT_SECRET:?LLDAP_JWT_SECRET must be set in .env}
      - LLDAP_LDAP_BASE_DN=dc=opendirectory,dc=local
      - LLDAP_LDAP_USER_DN=admin
      - LLDAP_LDAP_USER_PASS=${LLDAP_ADMIN_PASSWORD:?LLDAP_ADMIN_PASSWORD must be set in .env}
    volumes:
      - lldap-data:/data
    ports:
      - "3890:3890"
      - "17170:17170"
    networks:
      - opendirectory

  # ===================
  # Core Services (from /services/core)
  # ===================
  
  identity-service:
    build:
      context: ./services/core/identity-service
      dockerfile: Dockerfile
    container_name: od-identity-service
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3001
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@postgres/identity
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
      - RABBITMQ_URL=amqp://opendirectory:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set in .env}@rabbitmq:5672
    ports:
      - "3001:3001"
    networks:
      - opendirectory
    depends_on:
      - postgres
      - redis
      - rabbitmq
    volumes:
      - ./services/core/identity-service:/app
      - /app/node_modules

  auth-service:
    build:
      context: ./services/core/authentication-service
      dockerfile: Dockerfile
    container_name: od-auth-service
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3002
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@postgres/auth
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - LDAP_URL=ldap://lldap:3890
    ports:
      - "3002:3002"
    networks:
      - opendirectory
    depends_on:
      - postgres
      - redis
      - lldap
    volumes:
      - ./services/core/auth-service:/app
      - /app/node_modules

  device-service:
    build:
      context: ./services/core/device-service
      dockerfile: Dockerfile
    container_name: od-device-service
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3003
      - MONGODB_URL=mongodb://opendirectory:${MONGO_PASSWORD:?MONGO_PASSWORD must be set in .env}@mongodb:27017/devices
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
      - RABBITMQ_URL=amqp://opendirectory:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD must be set in .env}@rabbitmq:5672
    ports:
      - "3003:3003"
    networks:
      - opendirectory
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    volumes:
      - ./services/core/device-service:/app
      - /app/node_modules

  policy-service:
    build:
      context: ./services/core/policy-service
      dockerfile: Dockerfile
    container_name: od-policy-service
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3004
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@postgres/policy
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
    ports:
      - "3004:3004"
    networks:
      - opendirectory
    depends_on:
      - postgres
      - redis
    volumes:
      - ./services/core/policy-service:/app
      - /app/node_modules

  # ===================
  # Platform Services
  # ===================
  
  api-gateway:
    build:
      context: ./services/platform/api-gateway
      dockerfile: Dockerfile
    container_name: od-api-gateway
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - API_GATEWAY_PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - LOG_LEVEL=info
    ports:
      - "3010:3000"
      - "3011:3001"  # WebSocket
    networks:
      - opendirectory
    depends_on:
      - redis
    volumes:
      - ./services/platform/api-gateway:/app
      - /app/node_modules

  api-backend:
    build:
      context: ./services/platform/api-backend
      dockerfile: Dockerfile
    container_name: od-api-backend
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=8080
      - CORS_ORIGIN=http://localhost:3000
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@postgres/api
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
    ports:
      - "8080:8080"
    networks:
      - opendirectory
    depends_on:
      - postgres
      - redis
      - identity-service
      - auth-service
      - device-service
      - policy-service
      - network-infrastructure
    volumes:
      - ./services/platform/api-backend:/app
      - /app/node_modules

  integration-service:
    build:
      context: ./services/platform/integration-service
      dockerfile: Dockerfile
    container_name: od-integration-service
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@postgres/integration
      - LLDAP_URL=http://lldap:17170
      - LLDAP_ADMIN_USER=admin
      - LLDAP_ADMIN_PASSWORD=${LLDAP_ADMIN_PASSWORD:-changeme}
      - GRAFANA_URL=${GRAFANA_URL:-http://grafana:3000}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - VAULT_URL=${VAULT_URL:-http://vault:8200}
    ports:
      - "4000:4000"
    networks:
      - opendirectory
    depends_on:
      - postgres
      - lldap
    # No source mounts — Dockerfile builds TypeScript to dist/ inside image

  # ===================
  # Printer Service
  # ===================
  
  printer-service:
    build:
      context: ./services/core/printer-service
      dockerfile: Dockerfile
    container_name: od-printer-service
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3006
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@postgres/printers
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
      - CUPS_HOST=localhost
      - CUPS_PORT=631
      - ENABLE_DISCOVERY=true
      - ENABLE_SCANNING=true
    ports:
      - "3006:3006"
      - "631:631"
    networks:
      - opendirectory
    depends_on:
      - postgres
      - redis
    volumes:
      - ./services/core/printer-service:/app
      - /app/node_modules
      - printer-spool:/var/spool/cups
      - printer-cache:/var/cache/cups
      - printer-config:/etc/cups
      - scanned-documents:/var/scans
    privileged: true  # Required for CUPS and device access
    devices:
      - /dev/bus/usb:/dev/bus/usb  # USB printers/scanners

  # ===================
  # Network Infrastructure Service
  # ===================
  
  network-infrastructure:
    build:
      context: ./services/core/network-infrastructure
      dockerfile: Dockerfile
    container_name: od-network-infrastructure
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=3007
      - DATABASE_URL=postgres://opendirectory:${DB_PASSWORD:?DB_PASSWORD must be set in .env}@postgres/network
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
      - ENABLE_DNS_SERVER=true
      - ENABLE_DHCP_SERVER=true
      - ENABLE_FILE_SHARES=true
      - ENABLE_NETWORK_DISCOVERY=true
      - ENABLE_NETWORK_MONITORING=true
      - BIND_CONFIG_PATH=/etc/bind
      - DHCP_CONFIG_PATH=/etc/dhcp
      - SAMBA_CONFIG_PATH=/etc/samba
    ports:
      - "3007:3007"
    networks:
      - opendirectory
    depends_on:
      - postgres
      - redis

  # ===================
  # Frontend
  # ===================
  
  web-app:
    build:
      context: ./frontend/web-app
      dockerfile: Dockerfile
    container_name: od-web-app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
      - NEXT_PUBLIC_AD_DOMAIN=${AD_DOMAIN}
      - NEXT_PUBLIC_APP_URL=${APP_URL:-https://opendirectory.heusser.local}
      - INTEGRATION_SERVICE_URL=http://integration-service:4000
      - PRINTER_SERVICE_URL=http://printer-service:3006
      - APP_STORE_URL=http://app-store:3906
    ports:
      - "3000:3000"
    networks:
      - opendirectory
    depends_on:
      - api-backend
      - integration-service
      - app-store
    # No source mounts — the Dockerfile builds the app into the image.
    # Mounting the source would override the built .next and serve stale content.


  # ===================
  # Monitoring (Optional)
  # ===================
  
  grafana:
    image: grafana/grafana:latest
    container_name: od-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set in .env}
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3500:3000"
    networks:
      - opendirectory

  prometheus:
    image: prom/prometheus:latest
    container_name: od-prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - opendirectory

  node-exporter:
    image: prom/node-exporter:latest
    container_name: od-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - opendirectory

  # ===================
  # Secrets Management
  # ===================

  vault:
    image: hashicorp/vault:latest
    container_name: od-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN:-opendirectory-root-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    networks:
      - opendirectory
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===================
  # Intelligence Services
  # ===================

  graph-explorer:
    build:
      context: ./services/enterprise/graph-explorer
    container_name: od-graph-explorer
    environment:
      PORT: 3900
      NODE_ENV: production
      DEVICE_SERVICE_URL: http://device-service:3003
      AUTH_SERVICE_URL: http://auth-service:3002
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
    ports:
      - "3900:3900"
    networks:
      - opendirectory
    depends_on:
      - redis
      - device-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3900/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  policy-simulator:
    build:
      context: ./services/enterprise/policy-simulator
    container_name: od-policy-simulator
    environment:
      PORT: 3901
      NODE_ENV: production
      DEVICE_SERVICE_URL: http://device-service:3003
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
    ports:
      - "3901:3901"
    networks:
      - opendirectory
    depends_on:
      - redis
      - device-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3901/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  security-scanner:
    build:
      context: ./services/enterprise/security-scanner
    container_name: od-security-scanner
    environment:
      PORT: 3902
      NODE_ENV: production
      DEVICE_SERVICE_URL: http://device-service:3003
      AUTH_SERVICE_URL: http://auth-service:3002
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
    ports:
      - "3902:3902"
    networks:
      - opendirectory
    depends_on:
      - redis
      - device-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3902/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  device-lifecycle:
    build:
      context: ./services/enterprise/device-lifecycle
    container_name: od-device-lifecycle
    environment:
      PORT: 3903
      NODE_ENV: production
      DEVICE_SERVICE_URL: http://device-service:3003
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
    ports:
      - "3903:3903"
    networks:
      - opendirectory
    depends_on:
      - redis
      - device-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3903/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  antivirus-protection:
    build:
      context: ./services/enterprise/antivirus-protection
    container_name: od-antivirus-protection
    environment:
      PORT: 3905
      NODE_ENV: production
      DEVICE_SERVICE_URL: http://device-service:3003
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
    ports:
      - "3905:3905"
    networks:
      - opendirectory
    depends_on:
      - redis
      - device-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3905/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  auto-remediation:
    build:
      context: ./services/enterprise/auto-remediation
    container_name: od-auto-remediation
    environment:
      PORT: 3904
      NODE_ENV: production
      DEVICE_SERVICE_URL: http://device-service:3003
      SECURITY_SCANNER_URL: http://security-scanner:3902
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}@redis:6379
    ports:
      - "3904:3904"
    networks:
      - opendirectory
    depends_on:
      - redis
      - device-service
      - security-scanner
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3904/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── App Store ──────────────────────────────────────────────────────────────
  app-store:
    build:
      context: ./services/enterprise/app-store
      dockerfile: Dockerfile
    container_name: opendirectory-app-store
    environment:
      PORT: 3906
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-opendirectory}
      DB_USER: ${DB_USER:-opendirectory}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      DEVICE_SERVICE_URL: http://device-service:3003
      LLDAP_URL: http://lldap:17170
    ports:
      - "3906:3906"
    networks:
      - opendirectory
    depends_on:
      - postgres
      - device-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3906/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ===================
# Networks
# ===================

networks:
  opendirectory:
    driver: bridge

# ===================
# Volumes
# ===================

volumes:
  postgres-data:
  redis-data:
  mongo-data:
  rabbitmq-data:
  lldap-data:
  grafana-data:
  prometheus-data:
  printer-spool:
  printer-cache:
  printer-config:
  scanned-documents:
  network-dns-config:
  network-dhcp-config:
  network-samba-config:
  network-shares:
  network-logs: